# Rust 版配置示例
# 当前已实现 Alist2Strm 与 Ani2Alist；LibraryPoster 后续会以独立模块继续扩展。

alist:
  - id: 我的Alist                            # 标识 ID，用于关联 AList 客户端对象
    base_url: http://alist:5244             # AList 服务器地址；未写协议时会默认补 https://
    public_url: https://alist.example.com   # 公共访问地址，用于 AlistURL 模式生成 .strm 内容（可选）
    username: admin                         # AList 用户名（使用 token 时可留空）
    password: adminadmin                    # AList 密码（使用 token 时可留空）
    otp_code:                               # AList 两步验证验证码（可选）
    token:                                  # AList 永久令牌（可选；填写后无需 username/password）
    wait_time: 0                            # AList API 请求最小间隔时间，单位秒；0 表示不限速

  - id: OpenList                            # 标识 ID，用于关联 AList 客户端对象
    base_url: http://openlist.com:443       # 兼容 OpenList
    public_url: 
    username: admin
    password: adminadmin
    otp_code:
    token:
    wait_time: 0

  - id: 使用Token认证的Alist
    base_url: http://alist.com:5244
    public_url:
    username:
    password:
    otp_code:
    token: alist-your-static-token
    wait_time: 0.2

alist2strm_tasks:
  - id: 动漫                                 # 标识 ID，用于日志和 .strm 智能保护状态文件
    cron: 0 0 20 * * *                      # 后台定时任务 Cron 表达式；格式为`<秒> <分> <时> <日> <月> <星期>`
    alist: 我的Alist                         # 关联上面定义的 AList 客户端 ID（可以多个任务关联同一个 AList 客户端实现复用）
    source_dir: /ani                        # AList 服务器上需要扫描的目录
    target_dir: /media/ani                  # 本地 .strm 和伴生文件输出目录
    mode: AlistURL                          # .strm 内容模式：AlistURL、RawURL、AlistPath
    flatten_mode: false                     # 平铺模式；开启后所有 .strm 输出到同一级目录，且不会下载伴生文件
    overwrite: false                        # 覆盖模式；本地已存在同名文件时是否重新生成/下载
    concurrency: 50                         # 执行任务的最大并发处理数，可以减轻运行设备与 AList 服务器负载
    download:                               # 下载相关配置
      enable: false                         # 是否下载字幕、图片、NFO 和自定义后缀等伴生文件
      subtitle: false                       # 是否下载字幕文件：.ass、.srt、.ssa、.sub
      image: false                          # 是否下载图片文件：.png、.jpg
      nfo: false                            # 是否下载 .nfo 文件
      other_ext: []                         # 自定义下载后缀列表，例如 [".zip", ".md"]
      concurrency: 5                        # 最大同时下载伴生文件数量
    sync:                                   # 同步远程相关配置
      enabled: true                         # 是否同步服务器删除；开启后远端不存在的本地文件会被删除
      ignore: "\\.(nfo|jpg)$"               # 同步删除时忽略的文件名正则；仅匹配文件名，不匹配完整路径
      smart_protection:                     # .strm 智能保护，仅在 sync.enabled 为 true 时生效
        enabled: true                       # 是否启用保护（默认 false）
        threshold: 100                      # 触发保护的待删除 .strm 数量阈值
        grace_scans: 3                      # 达到阈值后，连续确认多少次才真正删除

  - id: 电影
    cron: 0 0 20 * * *
    alist: 使用Token认证的Alist
    source_dir: /movies
    target_dir: /media/movies
    mode: RawURL
    flatten_mode: false
    overwrite: false
    concurrency: 20
    download:
      enable: true
      subtitle: true
      image: true
      nfo: true
      other_ext:
        - .zip
        - .md
      concurrency: 5
    sync:
      enabled: true
      ignore:
      smart_protection:
        enabled: false

ani2alist_tasks:
  - id: 新番追更                                      # 标识 ID，用于日志和调度识别
    cron: 0 20 12 * * *                              # 后台定时任务 Cron 表达式
    alist: OpenList                                  # 关联上面定义的 AList 客户端 ID（需要管理员权限）
    target_dir: /Anime                               # UrlTree 存储器挂载路径，不存在时会自动创建
    source:                                          # 数据源配置
      source_url: https://aniopen.an-i.workers.dev   # ANI Open 目录数据源完整 URL
      rss_url: https://api.ani.rip/ani-download.xml  # ANI RSS 完整 URL
    update:                                          # 更新模式（有rss、season、keyword三种模式）
      mode: rss                                      # RSS 追更模式，读取 rss_url 中的最新条目

  - id: 指定季度
    cron: 0 0 7 * * *
    alist: OpenList
    target_dir: /Anime
    source:
      source_url: https://aniopen.an-i.workers.dev
      rss_url: https://api.ani.rip/ani-download.xml
    update:
      mode: season                                   # 指定季度
      year: 2026
      month: 4

  - id: 自定义关键字
    cron: 0 30 7 * * *
    alist: 我的Alist
    target_dir: /Anime
    source:
      source_url: https://aniopen.an-i.workers.dev
      rss_url: https://api.ani.rip/ani-download.xml
    update:
      mode: keyword                                 # 关键字模式，递归解析 source_url/{keyword}/
      keyword: "2026-4"
