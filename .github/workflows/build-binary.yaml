name: Build Binary

on:
  workflow_call:

jobs:
  build:
    name: Build AutoFilm for ${{ matrix.platform.release_for }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      matrix:
        platform:
          - release_for: Linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            bin: autofilm
            archive: AutoFilm-x86_64-musl.tar.gz
            archive_kind: tar.gz
          - release_for: Linux-aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            bin: autofilm
            archive: AutoFilm-aarch64-musl.tar.gz
            archive_kind: tar.gz
          - release_for: macOS-x86_64
            os: macOS-latest
            target: x86_64-apple-darwin
            bin: autofilm
            archive: AutoFilm-x86_64-Darwin.tar.gz
            archive_kind: tar.gz
          - release_for: macOS-aarch64
            os: macOS-latest
            target: aarch64-apple-darwin
            bin: autofilm
            archive: AutoFilm-aarch64-Darwin.tar.gz
            archive_kind: tar.gz
          - release_for: Windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: autofilm.exe
            archive: AutoFilm-x86_64-Windows.zip
            archive_kind: zip
          - release_for: Windows-aarch64
            os: windows-latest
            target: aarch64-pc-windows-msvc
            bin: autofilm.exe
            archive: AutoFilm-aarch64-Windows.zip
            archive_kind: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Build binary
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.platform.target }}
          args: "--locked --release"
          strip: true

      - name: Package as archive
        shell: bash
        env:
          TARGET: ${{ matrix.platform.target }}
          BIN: ${{ matrix.platform.bin }}
          ARCHIVE: ${{ matrix.platform.archive }}
          ARCHIVE_KIND: ${{ matrix.platform.archive_kind }}
        run: |
          set -euo pipefail

          release_dir="target/${TARGET}/release"
          archive_path="${GITHUB_WORKSPACE}/${ARCHIVE}"

          cp config/config.example.yaml "${release_dir}/config.example.yaml"
          cp LICENSE "${release_dir}/LICENSE"
          cp README.md "${release_dir}/README.md"

          cd "${release_dir}"

          files=("${BIN}" "config.example.yaml" "LICENSE" "README.md")

          case "${ARCHIVE_KIND}" in
            zip)
              7z a "${archive_path}" "${files[@]}"
              ;;
            tar.gz)
              tar czf "${archive_path}" "${files[@]}"
              ;;
            *)
              echo "Unsupported archive kind: ${ARCHIVE_KIND}" >&2
              exit 1
              ;;
          esac

      - name: Upload release artifact
        uses: actions/upload-artifact@v6
        with:
          name: AutoFilm-${{ matrix.platform.release_for }}
          path: ${{ github.workspace }}/${{ matrix.platform.archive }}
