name: Build Docker

on:
  workflow_call:
    inputs:
      push:
        description: "Whether to push the Docker image"
        required: true
        type: boolean
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  build-docker:
    runs-on: ubuntu-latest
    name: Build Docker Image
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Docker Meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/autofilm

      - name: Download Linux binary artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: "*-unknown-linux-musl"
          path: targets

      - name: Prepare Docker build binaries
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p targets/linux/amd64 targets/linux/arm64

          cp targets/x86_64-unknown-linux-musl/autofilm targets/linux/amd64/autofilm
          cp targets/aarch64-unknown-linux-musl/autofilm targets/linux/arm64/autofilm

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.ci
          platforms: |
            linux/amd64
            linux/arm64
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Docker Hub Description
        if: ${{ inputs.push }}
        continue-on-error: true
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/autofilm
          short-description: ${{ github.event.repository.description }}
